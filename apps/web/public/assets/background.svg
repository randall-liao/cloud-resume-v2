<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Abstract atmospheric background</title>
  <desc id="desc">Layered gradient circles and arcs used as a soft decorative background.</desc>
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#f5d06f" stop-opacity="0.95" />
      <stop offset="38%" stop-color="#f29e4c" stop-opacity="0.78" />
      <stop offset="68%" stop-color="#d96c5f" stop-opacity="0.52" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="arcWarm" x1="10%" y1="15%" x2="88%" y2="85%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.85" />
      <stop offset="45%" stop-color="#f97316" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="arcCool" x1="88%" y1="12%" x2="12%" y2="92%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.1" />
    </linearGradient>
    <filter id="soften" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="20" />
    </filter>
  </defs>
  <rect width="640" height="640" fill="#0f172a" />
  <circle cx="318" cy="278" r="228" fill="url(#coreGlow)" filter="url(#soften)" />
  <circle cx="230" cy="220" r="112" fill="#fb7185" opacity="0.15" filter="url(#soften)" />
  <circle cx="430" cy="398" r="124" fill="#38bdf8" opacity="0.18" filter="url(#soften)" />
  <path
    d="M118 340c42-120 146-206 276-206 53 0 104 14 146 39"
    fill="none"
    stroke="url(#arcWarm)"
    stroke-linecap="round"
    stroke-width="34"
  />
  <path
    d="M144 410c58 66 141 106 233 106 53 0 104-13 151-37"
    fill="none"
    stroke="url(#arcCool)"
    stroke-linecap="round"
    stroke-width="22"
  />
</svg>
