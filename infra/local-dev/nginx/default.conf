# =============================================================================
# infra/local-dev/nginx/default.conf
# Serves the cloud-resume-v2 Vite multi-page static build for local testing.
# Pages emitted by the build: index.html (resume SPA) and spyfall-arena.html.
# =============================================================================

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets so local loads mirror the CloudFront experience.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/xml;

    # Content-hashed Vite assets are immutable, so cache them aggressively.
    location /assets/ {
        access_log off;
        expires    1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # Lightweight endpoint used by the docker compose healthcheck.
    location = /healthz {
        access_log off;
        add_header  Content-Type text/plain;
        return      200 "ok\n";
    }

    # Serve the multi-page static build. Real files (index.html,
    # spyfall-arena.html, favicon.svg, robots.txt, sitemap.xml, ...) resolve
    # directly; unknown paths fall back to the resume entry point.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
