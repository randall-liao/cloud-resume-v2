name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  quality:
    name: Docs, Lint, Workspace Build & Artifact Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate docs map
        run: npm run docs:validate
        # AGENT NOTE: This checks that AGENTS.md exists, the required docs exist,
        # and markdown links resolve from their real file locations.

      - name: Lint (ESLint)
        run: npm run lint
        # AGENT NOTE: If this fails, run `npm run lint` locally and fix all
        # zero-warning threshold violations before re-pushing.

      - name: Build shared packages
        run: npm run build:packages
        # AGENT NOTE: This validates the package boundaries under packages/
        # before relying on app integration to catch regressions.

      - name: Build web app
        run: npm run build:web
        # AGENT NOTE: If this fails, the production frontend build is broken.
        # Run `npm run build:web` locally to see the same failure mode.

      - name: Run smoke tests
        run: npm run test
        # AGENT NOTE: This is the baseline UI protection path for app boot,
        # shared content rendering, and theme behavior.

      - name: Validate dist artifact
        run: bash scripts/validate-dist.sh apps/web/dist
        # AGENT NOTE: Verifies that apps/web/dist is suitable for S3/CloudFront hosting.
        # See scripts/validate-dist.sh for remediation steps.
