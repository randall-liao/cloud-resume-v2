name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  quality:
    name: Docs, Lint, Workspace Build & Artifact Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Validate docs map
        run: npm run docs:validate
        # AGENT NOTE: This checks that AGENTS.md exists, the required docs exist,
        # and markdown links resolve from their real file locations.

      - name: Lint all workspaces
        run: npx turbo run lint
        # AGENT NOTE: Uses turborepo to lint across all workspaces.

      - name: Build all workspaces
        run: npx turbo run build
        # AGENT NOTE: Uses turborepo to build across all workspaces.

      - name: Run tests across all workspaces
        run: npx turbo run test && python3 scripts/test_agents_scripts.py
        # AGENT NOTE: Uses turborepo to test across all workspaces.

      - name: Validate dist artifact
        run: bash scripts/validate-dist.sh apps/web/dist
        # AGENT NOTE: Verifies that apps/web/dist is suitable for S3/CloudFront hosting.
        # See scripts/validate-dist.sh for remediation steps.
